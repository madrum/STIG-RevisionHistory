name: Refresh STIG Content

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-stig-content
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run STIG content refresh
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          Set-Location $env:GITHUB_WORKSPACE

          .\Confirm-StigContentVersions.ps1
          .\Compare-StigBenchmarkRevisions.ps1

      - name: Detect repository changes
        id: changes
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE

          if (git status --short -- stig-info.json Current Archive) {
            'has_changes=true' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
          else {
            'has_changes=false' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Commit and push refreshed content
        if: steps.changes.outputs.has_changes == 'true'
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add -- stig-info.json Current Archive
          git commit -m 'Refresh STIG benchmark content'
          git push

      - name: No changes detected
        if: steps.changes.outputs.has_changes != 'true'
        shell: pwsh
        run: Write-Host 'No STIG content changes detected.'