# Note: The pipeline agent/build service requires `Contribute` permission on this repo for the commit/push step to succeed.

trigger: none
pr: none

schedules:
- cron: "0 9 * * 1"
  displayName: Weekly STIG content refresh
  branches:
    include:
    - main
  always: true

pool:
  vmImage: windows-latest

jobs:
- job: RefreshStigContent
  displayName: Refresh STIG content

  steps:
  - checkout: self
    clean: true
    fetchDepth: 0
    persistCredentials: true

  - pwsh: |
      Set-StrictMode -Version Latest
      $ErrorActionPreference = 'Stop'

      Set-Location '$(Build.SourcesDirectory)'

      .\Confirm-StigContentVersions.ps1
      .\Compare-StigBenchmarkRevisions.ps1
    displayName: Run STIG content refresh

  - pwsh: |
      Set-StrictMode -Version Latest
      $ErrorActionPreference = 'Stop'

      Set-Location '$(Build.SourcesDirectory)'

      $hasChanges = [bool](git status --short -- stig-info.json Current Archive)
      if ($hasChanges) {
          Write-Host 'Detected STIG content changes.'
          Write-Host '##vso[task.setvariable variable=HasChanges]true'
      }
      else {
          Write-Host 'No STIG content changes detected.'
          Write-Host '##vso[task.setvariable variable=HasChanges]false'
      }
    displayName: Detect repository changes

  - pwsh: |
      Set-StrictMode -Version Latest
      $ErrorActionPreference = 'Stop'

      Set-Location '$(Build.SourcesDirectory)'

      $branchName = '$(Build.SourceBranch)' -replace '^refs/heads/', ''
      if ([string]::IsNullOrWhiteSpace($branchName) -or $branchName -eq '$(Build.SourceBranch)') {
        throw "Expected a branch build, but Build.SourceBranch was '$(Build.SourceBranch)'."
      }

      git config user.name 'Azure Pipelines'
      git config user.email 'azure-pipelines@local'

      git add -- stig-info.json Current Archive

      if (git diff --cached --quiet) {
          Write-Host 'No staged changes found after git add.'
          exit 0
      }

      git commit -m 'Refresh STIG benchmark content'
      git push origin HEAD:$branchName
    displayName: Commit and push refreshed content
    condition: and(succeeded(), eq(variables['HasChanges'], 'true'))

  - pwsh: Write-Host 'No STIG content changes detected.'
    displayName: No changes detected
    condition: and(succeeded(), ne(variables['HasChanges'], 'true'))
